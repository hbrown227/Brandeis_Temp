<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandeis Light Microscopy — Instrument Status</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #003478;
  --gold:    #C8A951;
  --blue-lt: #e8edf5;
  --ok:      #2e7d32;
  --ok-bg:   #e8f5e9;
  --issue:   #b71c1c;
  --issue-bg:#fdecea;
  --warn:    #e65100;
  --warn-bg: #fff3e0;
  --watch:   #1565c0;
  --watch-bg:#e3f2fd;
  --off:     #616161;
  --off-bg:  #f5f5f5;
  --border:  #dde3ef;
  --text:    #1a1a1a;
  --muted:   #6b7280;
  --surface: #ffffff;
  --bg:      #f4f6fb;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--blue);
  padding: 0 1.25rem;
  display: flex; align-items: stretch; justify-content: space-between; gap: 8px;
  border-bottom: 3px solid var(--gold);
}
.header-brand { display: flex; align-items: center; gap: 12px; padding: .85rem 0; }
.header-logo {
  width: 36px; height: 36px; border-radius: 6px;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: var(--blue); flex-shrink: 0;
}
.header-title { color: #fff; font-size: 15px; font-weight: 600; line-height: 1.2; }
.header-sub   { color: rgba(255,255,255,.6); font-size: 11px; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
#last-updated { font-size: 11px; color: rgba(255,255,255,.55); white-space: nowrap; }
.btn-refresh {
  padding: 6px 12px; border-radius: 7px; border: 1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.1); color: #fff; font-size: 12px; cursor: pointer;
  transition: background .15s;
}
.btn-refresh:hover { background: rgba(255,255,255,.2); }

/* ── Layout ── */
main { max-width: 820px; margin: 0 auto; padding: 1.25rem 1rem; }

/* ── Tab bar ── */
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer; font-size: 13px; color: var(--muted);
  transition: all .15s; font-weight: 500;
}
.tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.section { display: none; }
.section.active { display: block; }

/* ── Cards ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }

/* ── Metrics ── */
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px,1fr)); gap: 10px; margin-bottom: 1.25rem; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .85rem; text-align: center; }
.metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.metric-value { font-size: 24px; font-weight: 700; }

/* ── Badges ── */
.badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge-ok          { background: var(--ok-bg);   color: var(--ok); }
.badge-issue       { background: var(--issue-bg); color: var(--issue); }
.badge-maintenance { background: var(--warn-bg);  color: var(--warn); }
.badge-monitoring  { background: var(--watch-bg); color: var(--watch); }
.badge-offline     { background: var(--off-bg);   color: var(--off); }
.badge-new         { background: var(--blue-lt);  color: var(--blue); }
.badge-internal    { background: var(--warn-bg);  color: var(--warn); }
.badge-company     { background: #f3e5f5; color: #6a1b9a; }
.badge-resolved    { background: var(--ok-bg);    color: var(--ok); }

/* ── Instrument list ── */
.loc-header {
  font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase;
  letter-spacing: .07em; padding: 12px 0 5px; margin-top: 4px;
  border-bottom: 2px solid var(--gold); margin-bottom: 4px;
}
.inst-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--bg); gap: 8px; }
.inst-row:last-child { border-bottom: none; }
.inst-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; }
.inst-note { font-size: 11px; color: var(--issue); margin-top: 1px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok          { background: var(--ok); }
.dot-issue       { background: var(--issue); }
.dot-maintenance { background: var(--warn); }
.dot-monitoring  { background: var(--watch); }
.dot-offline     { background: var(--off); }

/* ── Banner ── */
.banner { border-radius: 10px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; font-weight: 500; }
.banner-ok    { background: var(--ok-bg);   color: var(--ok); }
.banner-issue { background: var(--issue-bg); color: var(--issue); }

/* ── Reports ── */
.report-list { display: flex; flex-direction: column; gap: 10px; }
.report-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 1rem; }
.report-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 8px; margin-top: 8px; cursor: pointer; }
.loc-pill { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 20px; background: var(--blue-lt); color: var(--blue); }
.sev-high   { color: var(--issue); font-weight: 500; }
.sev-medium { color: var(--warn);  font-weight: 500; }
.sev-low    { color: var(--muted); }
.eta-display { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── Legend ── */
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }

/* ── Misc ── */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
.error-box { padding: 1rem; background: var(--issue-bg); color: var(--issue); border-radius: 8px; font-size: 13px; line-height: 1.6; }
.empty { text-align: center; padding: 2.5rem; color: #aaa; font-size: 14px; }
.section-title { font-size: 14px; font-weight: 600; margin-bottom: .85rem; color: var(--blue); }

/* ── Lightbox ── */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 300; display: none; align-items: center; justify-content: center; cursor: pointer; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }

/* ── Footer ── */
footer {
  text-align: center; padding: 2rem 1rem; font-size: 12px; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 1rem;
}
footer a { color: var(--blue); text-decoration: none; }
footer a:hover { text-decoration: underline; }

select { width: auto; font-size: 13px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-logo">B</div>
    <div>
      <div class="header-title">Light Microscopy Core Facility</div>
      <div class="header-sub">Brandeis University · Instrument Status</div>
    </div>
  </div>
  <div class="header-right">
    <div id="last-updated">Loading…</div>
    <button class="btn-refresh" onclick="refreshAll()" id="refresh-btn">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('dashboard', this)">Status</button>
    <button class="tab" onclick="showTab('reports', this)">Reports</button>
  </div>

  <!-- Status tab -->
  <div id="tab-dashboard" class="section active">
    <div id="banner" class="banner banner-ok">Checking status…</div>

    <div class="metric-grid" id="metrics"></div>

    <div class="legend">
      <div class="legend-item"><span class="dot dot-ok"></span> Operational</div>
      <div class="legend-item"><span class="dot dot-monitoring"></span> Monitoring</div>
      <div class="legend-item"><span class="dot dot-maintenance"></span> Maintenance</div>
      <div class="legend-item"><span class="dot dot-issue"></span> Issue</div>
      <div class="legend-item"><span class="dot dot-offline"></span> Offline</div>
    </div>

    <div class="card" id="inst-list">
      <div class="loading"><span class="spinner"></span> Loading instruments…</div>
    </div>
  </div>

  <!-- Reports tab -->
  <div id="tab-reports" class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:8px;flex-wrap:wrap">
      <div class="section-title" style="margin-bottom:0">Issue reports</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <select id="filter-status" onchange="renderReports()">
          <option value="open" selected>Open</option>
          <option value="all">All</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>
    </div>
    <div id="report-list" class="report-list">
      <div class="loading"><span class="spinner"></span> Loading reports…</div>
    </div>
  </div>
</main>

<footer>
  <p>
    <a href="https://www.brandeis.edu/science/core-research-facilities/light-microscopy/equipment/index.html" target="_blank">Equipment list</a>
    &nbsp;·&nbsp;
    <a href="https://www.brandeis.edu/science/core-research-facilities/light-microscopy/" target="_blank">Facility home</a>
  </p>
  <p style="margin-top:6px">Last updated: <span id="footer-updated">—</span></p>
</footer>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="" alt="Report photo">
</div>

<script>
// ── Supabase config — same credentials as the admin page ─────────────────────
const SUPABASE_URL = 'https://xbnxvsqdpppixdksqkgi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LTnO_lpbZ5Vu4sN8P5D3PA_SvslJ5NV';
// ─────────────────────────────────────────────────────────────────────────────

let locations = [], reports = [];

async function sb(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadAll() {
  const [locs, insts] = await Promise.all([
    sb('locations?select=*&order=sort_order'),
    sb('instruments?select=*&order=sort_order')
  ]);
  locations = locs.map(l => ({ ...l, instruments: insts.filter(i => i.location_id === l.id) }));
}

async function loadReports() {
  const data = await sb('reports?select=*&order=created_at.desc');
  reports = data.map(r => ({ ...r, ts: new Date(r.created_at).getTime() }));
}

function allInstruments() {
  return locations.flatMap(l => l.instruments.map(i => ({ ...i, locationName: l.name })));
}

function statusBadge(s) {
  const map    = { ok:'badge-ok', issue:'badge-issue', maintenance:'badge-maintenance', monitoring:'badge-monitoring', offline:'badge-offline' };
  const labels = { ok:'Operational', issue:'Issue', maintenance:'Maintenance', monitoring:'Monitoring', offline:'Offline' };
  return `<span class="badge ${map[s]||'badge-offline'}">${labels[s]||s}</span>`;
}

function progressLabel(p) {
  const map = {
    new:                  ['New', 'badge-new'],
    in_progress_internal: ['In progress \u2013 Internal', 'badge-internal'],
    in_progress_company:  ['In progress \u2013 Company', 'badge-company'],
    resolved_progress:    ['Resolved', 'badge-resolved']
  };
  const [label, cls] = map[p] || ['New', 'badge-new'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}

// ── Render: status dashboard ──────────────────────────────────────────────────
function renderDashboard() {
  const all   = allInstruments();
  const total = all.length;
  const ok    = all.filter(i => i.status === 'ok').length;
  const issue = all.filter(i => i.status === 'issue').length;
  const offline = all.filter(i => i.status === 'offline').length;
  const openR = reports.filter(r => r.status === 'open').length;

  const banner = document.getElementById('banner');
  if (issue > 0 || offline > 0) {
    banner.className = 'banner banner-issue';
    banner.textContent = `⚠️ ${issue + offline} instrument${(issue + offline) !== 1 ? 's' : ''} currently need attention`;
  } else {
    banner.className = 'banner banner-ok';
    banner.textContent = '✓ All instruments operational';
  }

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Operational</div><div class="metric-value" style="color:var(--ok)">${ok}</div></div>
    <div class="metric"><div class="metric-label">Issues</div><div class="metric-value" style="color:var(--issue)">${issue}</div></div>
    <div class="metric"><div class="metric-label">Open reports</div><div class="metric-value">${openR}</div></div>
  `;

  let html = '';
  for (const loc of locations) {
    if (!loc.instruments.length) continue;
    html += `<div class="loc-header">${loc.name}${loc.sub ? ` <span style="font-weight:400;opacity:.65">· ${loc.sub}</span>` : ''}</div>`;
    for (const inst of loc.instruments) {
      const nr = reports.filter(r => r.instrument_id === inst.id && r.status === 'open').length;
      html += `<div class="inst-row">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
          <span class="dot dot-${inst.status||'ok'}"></span>
          <div>
            <div class="inst-name">${inst.name}</div>
            ${nr ? `<div class="inst-note">${nr} open report${nr > 1 ? 's' : ''}</div>` : ''}
          </div>
        </div>
        ${statusBadge(inst.status||'ok')}
      </div>`;
    }
  }
  document.getElementById('inst-list').innerHTML = html || '<div class="empty">No instruments found.</div>';

  const now = new Date().toLocaleTimeString();
  document.getElementById('last-updated').textContent = 'Updated ' + now;
  document.getElementById('footer-updated').textContent = now;
}

// ── Render: reports list (read-only) ──────────────────────────────────────────
function renderReports() {
  const filterStatus = document.getElementById('filter-status').value;
  let list = filterStatus === 'all' ? reports : reports.filter(r => r.status === filterStatus);

  const el = document.getElementById('report-list');
  if (!list.length) { el.innerHTML = '<div class="empty">No reports found.</div>'; return; }

  const all = allInstruments();
  el.innerHTML = list.map(r => {
    const inst = all.find(i => i.id === r.instrument_id);
    const sev  = { high:'sev-high', medium:'sev-medium', low:'sev-low' }[r.severity] || '';
    const date = new Date(r.ts).toLocaleDateString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const prog = r.progress || 'new';
    const eta  = r.eta ? new Date(r.eta).toLocaleDateString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : null;

    return `<div class="report-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="min-width:0;flex:1">
          <div style="font-size:13px;font-weight:600">${inst ? inst.name : 'Unknown instrument'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">
            ${inst ? `<span class="loc-pill">${inst.locationName}</span> ` : ''}${date}${r.reporter ? ' · ' + r.reporter : ''} · <span class="${sev}">${r.severity} severity</span>
          </div>
          <div style="margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${progressLabel(prog)}
            ${eta ? `<span class="eta-display">🕐 ETA: ${eta}</span>` : ''}
          </div>
        </div>
        <span class="badge ${r.status === 'open' ? 'badge-issue' : 'badge-ok'}">${r.status}</span>
      </div>
      <div style="font-size:13px;color:#555;margin-top:8px;line-height:1.5">${r.description}</div>
      ${r.image_url ? `<img class="report-img" src="${r.image_url}" alt="Report photo" onclick="openLightbox('${r.image_url}')">` : ''}
    </div>`;
  }).join('');
}

function showTab(name, el) {
  document.querySelectorAll('.tab, .section').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'reports') renderReports();
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    await Promise.all([loadAll(), loadReports()]);
    renderDashboard();
    if (document.querySelector('#tab-reports.active')) renderReports();
  } catch(e) {
    document.getElementById('inst-list').innerHTML =
      `<div class="error-box">Could not connect to the database.<br><small>${e.message}</small></div>`;
  }
  btn.innerHTML = '↻ Refresh';
}

// Auto-refresh every 5 minutes
setInterval(refreshAll, 5 * 60 * 1000);

refreshAll();
</script>
</body>
</html>
